<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Home Dashboard Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { 
      --bg-overlay: rgba(244, 244, 249, 0.8); 
      --text: #333; 
      --card: rgba(255, 255, 255, 0.7); 
      --accent: #3498db; 
    }
    [data-theme="dark"] { 
      --bg-overlay: rgba(26, 26, 26, 0.85); 
      --text: #f0f0f0; 
      --card: rgba(45, 45, 45, 0.75); 
      --accent: #ff9f43; 
    }
    
    body { 
      font-family: 'Segoe UI', sans-serif; 
      margin: 0; 
      padding: 20px; 
      color: var(--text); 
      transition: 0.3s;
      background-image: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-overlay);
      z-index: -1;
      transition: 0.3s;
    }

    /* Small Theme Toggle in Left Corner */
    .theme-toggle-container {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1000;
    }

    .theme-icon-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .theme-icon-btn:hover { transform: scale(1.1); }
    
    .section { 
      background: var(--card); 
      padding: 20px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .greeting { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; color: var(--accent); text-align: center; }
    #weather { text-align: center; font-size: 0.95rem; margin-bottom: 10px; opacity: 0.9; font-weight: 500; }
    
    .manage-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .manage-list { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); }
    .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.05); margin-bottom: 5px; border-radius: 8px; }

    .meal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; }
    .meal-item { display: flex; flex-direction: column; }
    .meal-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: bold; margin-bottom: 8px; }
    
    select.meal-select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: var(--card); color: var(--text); font-weight: 500; cursor: pointer; }

    button { padding: 10px 15px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.2s; }
    input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; box-sizing: border-box; background: var(--card); color: var(--text); }
    
    .input-group { position: relative; display: flex; align-items: center; }
    .voice-btn { position: absolute; right: 10px; background: none; font-size: 20px; color: var(--accent); border: none; padding: 0; cursor: pointer; }

    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; padding: 14px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    li input[type="checkbox"] { width: auto; margin-right: 15px; transform: scale(1.3); cursor: pointer; }
    
    .task-info { flex-grow: 1; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; }
    .task-meta { font-size: 0.85rem; color: #e74c3c; font-weight: bold; white-space: nowrap; }
    .del-btn { background:none; color:#ff4d4d; font-size:24px; padding: 0 0 0 15px; cursor: pointer; }
    
    .manage-toggle-btn { background:none; color:var(--accent); font-size: 0.8rem; padding: 0; text-decoration: underline; margin-top: 5px; display: block; text-align: left; cursor: pointer; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body data-theme="light">

  <div class="theme-toggle-container">
    <button class="theme-icon-btn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌓</button>
  </div>

  <div class="section">
    <div id="greeting" class="greeting">Hello!</div>
    <div id="weather">Weather loading...</div>
  </div>

  <div class="section">
    <h3>🍱 Master Food Database</h3>
    <div class="manage-row">
      <input type="text" id="masterFoodInput" placeholder="Add dish (e.g. Pasta, Dosa)...">
      <button onclick="addMasterFood()" style="background:var(--accent); color:white;">Add</button>
    </div>
    <button onclick="toggleView('masterFoodTags', 'viewDbBtn')" id="viewDbBtn" class="manage-toggle-btn">🔧 Manage Food Items</button>
    <div id="masterFoodTags" class="manage-list"></div>
  </div>

  <div class="section">
    <h3>🗂️ Manage Categories</h3>
    <div class="manage-row">
      <input type="text" id="categoryInput" placeholder="New category (e.g. Gym, Work)...">
      <button onclick="addCategory()" style="background:var(--accent); color:white;">Add</button>
    </div>
    <button onclick="toggleView('categoryList', 'viewCatBtn')" id="viewCatBtn" class="manage-toggle-btn">🔧 Manage Categories</button>
    <div id="categoryList" class="manage-list"></div>
  </div>

  <div class="section">
    <h3>🍽️ Daily Food Menu</h3>
    <div class="meal-grid">
      <div class="meal-item">
        <span class="meal-label">Morning</span>
        <select id="select-morn" class="meal-select" onchange="updateMeal('morn')"></select>
      </div>
      <div class="meal-item">
        <span class="meal-label">Afternoon</span>
        <select id="select-aft" class="meal-select" onchange="updateMeal('aft')"></select>
      </div>
      <div class="meal-item">
        <span class="meal-label">Night</span>
        <select id="select-nyt" class="meal-select" onchange="updateMeal('nyt')"></select>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>✍️ Add Task</h3>
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="What's next?">
      <button class="voice-btn" onclick="startVoice()">🎙️</button>
    </div>
    <div style="display:flex; gap:5px;">
      <select id="taskCategorySelect"></select>
      <input type="date" id="taskDate">
      <input type="time" id="taskTime">
    </div>
    <button onclick="addTask()" style="background: #28a745; color: white; width: 100%; margin-top: 10px;">Add Task</button>
  </div>

  <div id="categoriesContainer"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBK8WyG6Ax3tRRq9sPBol-e9LDSiwB9JZE",
      authDomain: "mydashboard-7ace0.firebaseapp.com",
      databaseURL: "https://mydashboard-7ace0-default-rtdb.asia-southeast1.firebasedatabase.app/", 
      projectId: "mydashboard-7ace0",
      storageBucket: "mydashboard-7ace0.firebasestorage.app",
      messagingSenderId: "66001498071",
      appId: "1:66001498071:web:b28d7e058b99bdd0bfe592"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let tasks = [];
    let masterFoods = [];
    let categories = ["Home", "Personal"];
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function addCategory() {
      const val = document.getElementById('categoryInput').value.trim();
      if (val && !categories.includes(val)) {
        categories.push(val);
        db.ref('dashboard/categories').set(categories);
        document.getElementById('categoryInput').value = "";
      }
    }

    function deleteCategory(index) {
      if(categories.length <= 1) return alert("Minimum one category required.");
      if(confirm(`Delete "${categories[index]}" and its tasks?`)) {
        const catName = categories[index];
        categories.splice(index, 1);
        tasks = tasks.filter(t => t.cat !== catName);
        db.ref('dashboard/categories').set(categories);
        db.ref('dashboard/tasks').set(tasks);
      }
    }

    function addMasterFood() {
      const val = document.getElementById('masterFoodInput').value.trim();
      if (val && !masterFoods.includes(val)) {
        masterFoods.push(val);
        db.ref('dashboard/masterFoods').set(masterFoods);
        document.getElementById('masterFoodInput').value = "";
      }
    }

    function deleteMasterFood(index) {
      if(confirm(`Delete "${masterFoods[index]}"?`)) {
        masterFoods.splice(index, 1);
        db.ref('dashboard/masterFoods').set(masterFoods);
      }
    }

    function toggleView(id, btnId) {
      const container = document.getElementById(id);
      const btn = document.getElementById(btnId);
      const isFood = id === 'masterFoodTags';
      if (container.style.display === "block") {
        container.style.display = "none";
        btn.innerText = isFood ? "🔧 Manage Food Items" : "🔧 Manage Categories";
      } else {
        container.style.display = "block";
        btn.innerText = "✖ Close Management View";
      }
    }

    function updateMeal(timeOfDay) {
      const val = document.getElementById(`select-${timeOfDay}`).value;
      db.ref(`dashboard/meals/${timeOfDay}`).set(val);
    }

    db.ref('dashboard').on('value', (snap) => {
      const data = snap.val() || {};
      
      categories = data.categories || ["Home", "Personal"];
      document.getElementById('categoryList').innerHTML = categories.map((c, i) => `
        <div class="manage-item"><span>${c}</span><button onclick="deleteCategory(${i})" style="color:#ff4d4d; background:none;">Delete</button></div>
      `).join('');
      
      document.getElementById('taskCategorySelect').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');

      masterFoods = data.masterFoods || [];
      document.getElementById('masterFoodTags').innerHTML = masterFoods.map((f, i) => `
        <div class="manage-item"><span>${f}</span><button onclick="deleteMasterFood(${i})" style="color:#ff4d4d; background:none;">Delete</button></div>
      `).join('');

      ['morn', 'aft', 'nyt'].forEach(time => {
        const select = document.getElementById(`select-${time}`);
        const currentVal = (data.meals && data.meals[time]) ? data.meals[time] : "";
        let options = `<option value="">-- Select --</option>`;
        options += masterFoods.map(f => `<option value="${f}" ${f === currentVal ? 'selected' : ''}>${f}</option>`).join('');
        select.innerHTML = options;
      });

      if (data.theme) document.body.setAttribute('data-theme', data.theme);
      tasks = data.tasks || [];
      render();
    });

    function formatTime12h(timeStr) {
      if (!timeStr) return "";
      let [h, m] = timeStr.split(':');
      let ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m} ${ampm}`;
    }

    function formatDateFriendly(dateStr) {
      if (!dateStr) return "";
      const [y, m, d] = dateStr.split('-');
      return `${parseInt(d)}-${months[parseInt(m)-1]}`;
    }

    function updateGreeting() {
      const hrs = new Date().getHours();
      let greet = (hrs < 12) ? "Good Morning!" : (hrs < 17) ? "Good Afternoon!" : "Good Evening!";
      document.getElementById('greeting').innerText = greet;
    }

    async function fetchWeather() {
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
        const data = await res.json();
        document.getElementById('weather').innerText = `🌡️ ${data.current_weather.temperature}°C • Local Weather`;
      }, () => { document.getElementById('weather').innerText = "Location off"; });
    }

    function startVoice() {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.onresult = (e) => document.getElementById('taskInput').value = e.results[0][0].transcript;
      recognition.start();
    }

    function addTask() {
      const text = document.getElementById('taskInput').value;
      const cat = document.getElementById('taskCategorySelect').value;
      const date = document.getElementById('taskDate').value;
      const time = document.getElementById('taskTime').value;
      if (!text) return;
      tasks.push({ text, cat, date, time, done: false, notified: false });
      db.ref('dashboard/tasks').set(tasks);
      document.getElementById('taskInput').value = "";
    }

    function render() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = "";
      categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = "section";
        div.innerHTML = `<h3>${cat}</h3><ul id="list-${cat}"></ul>`;
        container.appendChild(div);
        tasks.filter(t => t.cat === cat).forEach((t) => {
          const idx = tasks.indexOf(t);
          const li = document.createElement('li');
          const meta = (t.date || t.time) ? `${formatDateFriendly(t.date)} ${formatTime12h(t.time)}` : "";
          li.innerHTML = `
            <input type="checkbox" ${t.done ? 'checked' : ''}>
            <div class="task-info">
              <span style="${t.done ? 'text-decoration:line-through; opacity:0.6' : ''}">${t.text}</span>
              <span class="task-meta">${meta}</span>
            </div>
            <button class="del-btn" onclick="deleteTask(${idx})">&times;</button>
          `;
          li.querySelector('input').onchange = () => { tasks[idx].done = !tasks[idx].done; db.ref('dashboard/tasks').set(tasks); };
          div.querySelector('ul').appendChild(li);
        });
      });
    }

    function deleteTask(i) { tasks.splice(i, 1); db.ref('dashboard/tasks').set(tasks); }
    function toggleTheme() {
      const next = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.body.setAttribute('data-theme', next);
      db.ref('dashboard/theme').set(next);
    }
    
    updateGreeting();
    fetchWeather();
  </script>
</body>
</html>

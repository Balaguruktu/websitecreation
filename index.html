<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Home Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 1. DEFINE COLORS FOR BOTH MODES */
    :root {
      --bg-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80');
      --section-bg: rgba(255, 255, 255, 0.92);
      --text-color: #333;
      --card-bg: #fff;
      --input-border: #ddd;
      --title-color: white;
    }

    [data-theme="dark"] {
      --bg-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80');
      --section-bg: rgba(30, 30, 30, 0.9);
      --text-color: #f0f0f0;
      --card-bg: #2c2c2c;
      --input-border: #444;
      --title-color: #ff9f43;
    }

    /* Global Styles */
    body { 
      font-family: 'Segoe UI', sans-serif; 
      margin: 0; 
      padding: 20px; 
      background-image: var(--bg-image); 
      background-size: cover; 
      background-position: center; 
      background-attachment: fixed; 
      min-height: 100vh; 
      transition: all 0.3s ease; /* Smooth transition when switching themes */
    }

    .section { 
      margin-bottom: 25px; 
      background: var(--section-bg); 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); 
      backdrop-filter: blur(8px); 
      color: var(--text-color);
    }

    h1 { text-align: center; color: var(--title-color); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    h2, h3 { margin-top: 0; color: var(--text-color); }

    input, select, textarea { 
      width: 100%; 
      margin-bottom: 12px; 
      padding: 12px; 
      box-sizing: border-box; 
      border: 1px solid var(--input-border); 
      border-radius: 6px; 
      background: var(--card-bg);
      color: var(--text-color);
    }

    button { 
      padding: 12px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer;
    }

    .theme-toggle-btn { background: #3498db; color: white; width: 100%; margin-bottom: 15px; }
    .notif-btn { background: #ff9f43; width: 100%; margin-bottom: 10px; color: white;}
    
    ul { list-style: none; padding: 0; }
    
    li { 
      background: var(--card-bg); 
      margin: 10px 0; 
      padding: 12px 15px; 
      border-radius: 8px; 
      display: flex; 
      align-items: center; 
      color: var(--text-color);
    }

    li input[type="checkbox"] { margin-right: 15px; width: 18px; height: 18px; }
    li span { flex-grow: 1; }
    .del-btn { background: none; color: #ff4d4d; font-size: 20px; margin-left: 10px; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body data-theme="light">

  <h1>Smart Home Dashboard</h1>

  <div class="section">
    <button class="theme-toggle-btn" onclick="toggleTheme()">🌓 Switch Theme</button>
    <button class="notif-btn" onclick="requestNotifPermission()">🔔 Enable Reminders</button>
  </div>

  <div class="section">
    <h2>Notes</h2>
    <textarea id="notes" placeholder="Notes shared across all devices..."></textarea>
  </div>

  <div class="section">
    <h2>New Task</h2>
    <input type="text" id="taskInput" placeholder="Task description">
    <select id="taskCategory">
        <option value="Home">Home</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
    </select>
    <input type="date" id="taskDate">
    <button onclick="addTask()" style="width: 100%; background: #28a745; color: white;">Add Task</button>
  </div>

  <div id="categoriesSection"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBK8WyG6Ax3tRRq9sPBol-e9LDSiwB9JZE",
      authDomain: "mydashboard-7ace0.firebaseapp.com",
      databaseURL: "https://mydashboard-7ace0-default-rtdb.asia-southeast1.firebasedatabase.app/", 
      projectId: "mydashboard-7ace0",
      storageBucket: "mydashboard-7ace0.firebasestorage.app",
      messagingSenderId: "66001498071",
      appId: "1:66001498071:web:b28d7e058b99bdd0bfe592"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let savedTasks = [];
    let currentTheme = "light";

    // --- THEME LOGIC ---
    function toggleTheme() {
      currentTheme = currentTheme === "light" ? "dark" : "light";
      applyTheme(currentTheme);
      db.ref('dashboard/theme').set(currentTheme); // Sync theme to cloud
    }

    function applyTheme(theme) {
      document.body.setAttribute('data-theme', theme);
    }

    // --- NOTIFICATIONS ---
    function requestNotifPermission() {
      Notification.requestPermission().then(p => {
        if(p === "granted") new Notification("Notifications Enabled!");
      });
    }

    // --- SYNC ENGINE ---
    db.ref('dashboard').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        savedTasks = data.tasks || [];
        document.getElementById('notes').value = data.notes || "";
        
        // Apply remote theme if it exists
        if (data.theme && data.theme !== currentTheme) {
          currentTheme = data.theme;
          applyTheme(currentTheme);
        }
        
        rebuildUI();
      }
    });

    function saveData() {
      db.ref('dashboard').update({
        tasks: savedTasks,
        notes: document.getElementById('notes').value,
        theme: currentTheme
      });
    }

    // Logic for tasks and notes is same as previous...
    document.getElementById('notes').addEventListener('input', saveData);

    function addTask() {
      const input = document.getElementById("taskInput");
      const category = document.getElementById("taskCategory").value;
      const date = document.getElementById("taskDate").value;
      if (input.value.trim()) {
        savedTasks.push({ text: input.value.trim(), done: false, category: category, date: date });
        saveData();
        input.value = "";
      }
    }

    function rebuildUI() {
      const section = document.getElementById("categoriesSection");
      section.innerHTML = "";
      ["Home", "Work", "Personal"].forEach(cat => {
        const catDiv = document.createElement("div");
        catDiv.className = "section";
        catDiv.innerHTML = `<h3>${cat}</h3><ul id="${cat.toLowerCase()}List"></ul>`;
        section.appendChild(catDiv);
        const list = document.getElementById(cat.toLowerCase() + "List");
        savedTasks.filter(t => t.category === cat).forEach((task, index) => {
          const li = document.createElement("li");
          li.innerHTML = `<input type="checkbox" ${task.done ? 'checked' : ''}> <span>${task.text}</span> <button class="del-btn" onclick="deleteTask(${index})">&times;</button>`;
          li.querySelector('input').onclick = () => { task.done = !task.done; saveData(); };
          list.appendChild(li);
        });
      });
    }

    window.deleteTask = function(index) {
      savedTasks.splice(index, 1);
      saveData();
    };
  </script>
</body>
</html>

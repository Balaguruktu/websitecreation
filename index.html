<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Home Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --bg: #f4f4f9; --text: #333; --card: #ffffff; --accent: #3498db; }
    [data-theme="dark"] { --bg: #1a1a1a; --text: #f0f0f0; --card: #2d2d2d; --accent: #ff9f43; }
    
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); transition: 0.3s; }
    .section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    button { padding: 10px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
    .theme-btn { background: var(--accent); color: white; width: 100%; margin-bottom: 15px; }
    
    input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; background: var(--card); color: var(--text); }
    
    .cat-manage { display: flex; gap: 8px; margin-top: 10px; }
    .cat-manage input { flex-grow: 1; }

    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); }
    li input[type="checkbox"] { width: auto; margin-right: 15px; transform: scale(1.2); cursor: pointer; }
    
    .task-info { flex-grow: 1; display: flex; flex-direction: column; }
    .task-text { font-size: 1.05rem; font-weight: 500; }
    .task-meta { font-size: 0.8rem; color: #e74c3c; margin-top: 3px; font-weight: bold; }
    
    .del-btn { background:none; color:#ff4d4d; font-size:22px; padding: 0 10px; cursor: pointer; }
    .clear-cat { font-size: 0.7rem; color: #999; cursor: pointer; text-decoration: underline; margin-left: 10px; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body data-theme="light">

  <h1>Our Haven</h1>

  <div class="section">
    <button class="theme-btn" onclick="toggleTheme()">🌓 Toggle Dark/Light Mode</button>
    <button onclick="requestNotif()" style="width:100%; background:#9b59b6; color:white;">🔔 Enable Notifications</button>
  </div>

  <div class="section">
    <h3>Manage Categories</h3>
    <div class="cat-manage">
      <input type="text" id="newCatInput" placeholder="New category name...">
      <button onclick="addCategory()" style="background:#3498db; color:white;">Add Category</button>
    </div>
    <span class="clear-cat" onclick="resetCategories()">Reset to Default Categories</span>
  </div>

  <div class="section">
    <h3>Add Task</h3>
    <input type="text" id="taskInput" placeholder="What needs doing?">
    <div style="display:flex; gap:5px;">
      <select id="taskCategory"></select>
      <input type="date" id="taskDate">
      <input type="time" id="taskTime">
    </div>
    <button onclick="addTask()" style="background: #28a745; color: white; width: 100%; margin-top: 10px;">Add Task</button>
  </div>

  <div id="categoriesContainer"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBK8WyG6Ax3tRRq9sPBol-e9LDSiwB9JZE",
      authDomain: "mydashboard-7ace0.firebaseapp.com",
      databaseURL: "https://mydashboard-7ace0-default-rtdb.asia-southeast1.firebasedatabase.app/", 
      projectId: "mydashboard-7ace0",
      storageBucket: "mydashboard-7ace0.firebasestorage.app",
      messagingSenderId: "66001498071",
      appId: "1:66001498071:web:b28d7e058b99bdd0bfe592"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let tasks = [];
    let categories = ["Home", "Work", "Personal"];

    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    // --- CORE DASHBOARD LOGIC ---
    function toggleTheme() {
      const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.body.setAttribute('data-theme', newTheme);
      db.ref('dashboard/theme').set(newTheme);
    }

    function requestNotif() {
      Notification.requestPermission().then(p => { if(p==='granted') new Notification("Reminders Active!"); });
    }

    // --- DATA HANDLING ---
    db.ref('dashboard').on('value', (snap) => {
      const data = snap.val() || {};
      if (data.theme) document.body.setAttribute('data-theme', data.theme);
      tasks = data.tasks || [];
      categories = data.categories || ["Home", "Work", "Personal"];
      render();
    });

    function addCategory() {
      const val = document.getElementById('newCatInput').value.trim();
      if (val && !categories.includes(val)) {
        categories.push(val);
        db.ref('dashboard/categories').set(categories);
        document.getElementById('newCatInput').value = "";
      }
    }

    function resetCategories() {
      if(confirm("Reset to Home, Work, and Personal?")) {
        db.ref('dashboard/categories').set(["Home", "Work", "Personal"]);
      }
    }

    function addTask() {
      const text = document.getElementById('taskInput').value;
      const cat = document.getElementById('taskCategory').value;
      const date = document.getElementById('taskDate').value;
      const time = document.getElementById('taskTime').value;
      if (!text) return;

      tasks.push({ text, cat, date, time, done: false, notified: false });
      db.ref('dashboard/tasks').set(tasks);
      document.getElementById('taskInput').value = "";
    }

    function deleteTask(i) {
      tasks.splice(i, 1);
      db.ref('dashboard/tasks').set(tasks);
    }

    // --- FORMATTING ---
    function formatTime12h(timeStr) {
      if (!timeStr) return "";
      let [h, m] = timeStr.split(':');
      let ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m} ${ampm}`;
    }

    function formatDateFriendly(dateStr) {
      if (!dateStr) return "";
      const [y, m, d] = dateStr.split('-');
      return `${parseInt(d)}-${months[parseInt(m)-1]}`;
    }

    // --- RENDER UI ---
    function render() {
      // Update the dropdown for adding tasks
      const select = document.getElementById('taskCategory');
      select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');

      // Build category sections
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = "";
      
      categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = "section";
        div.innerHTML = `<h3>${cat}</h3><ul id="list-${cat}"></ul>`;
        container.appendChild(div);

        const list = div.querySelector('ul');
        tasks.filter(t => t.cat === cat).forEach((t) => {
          const actualIndex = tasks.indexOf(t);
          const li = document.createElement('li');
          
          const friendlyDate = formatDateFriendly(t.date);
          const friendlyTime = formatTime12h(t.time);
          const metaString = (friendlyDate || friendlyTime) ? `• ${friendlyDate} ${friendlyTime}` : "";

          li.innerHTML = `
            <input type="checkbox" ${t.done ? 'checked' : ''}>
            <div class="task-info">
              <span class="task-text" style="${t.done ? 'text-decoration:line-through; opacity: 0.5;' : ''}">${t.text}</span>
              <span class="task-meta">${metaString}</span>
            </div>
            <button class="del-btn" onclick="deleteTask(${actualIndex})">&times;</button>
          `;
          li.querySelector('input').onclick = () => {
            tasks[actualIndex].done = !tasks[actualIndex].done;
            db.ref('dashboard/tasks').set(tasks);
          };
          list.appendChild(li);
        });
      });
    }

    // --- NOTIFICATION ENGINE ---
    setInterval(() => {
      const now = new Date();
      // Adjust curDate to local YYYY-MM-DD
      const curDate = now.toLocaleDateString('en-CA'); 
      const curTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

      tasks.forEach((t, i) => {
        if (!t.done && !t.notified && t.date === curDate && t.time === curTime) {
          if (Notification.permission === "granted") {
            new Notification("⏰ Task Reminder", { body: t.text });
            tasks[i].notified = true;
            db.ref('dashboard/tasks').set(tasks);
          }
        }
      });
    }, 15000);
  </script>
</body>
</html>

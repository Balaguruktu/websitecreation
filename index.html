<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Home Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Styles stay the same */
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-attachment: fixed; min-height: 100vh; }
    .section { margin-bottom: 30px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
    h1 { text-align: center; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    input, select, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
    button { padding: 10px 15px; border-radius: 5px; border: none; background: #333; color: white; cursor: pointer; font-weight: bold; }
    .notif-btn { background: #ff9f43; margin-bottom: 10px; width: 100%; }
    li { background: #fff; margin: 10px 0; padding: 10px; border-radius: 8px; display: flex; align-items: center; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

  <h1>Our Shared Dashboard</h1>

  <div class="section">
    <button class="notif-btn" onclick="requestNotifPermission()">🔔 Enable Task Reminders</button>
    <p id="notifStatus" style="font-size: 12px; text-align: center;"></p>
  </div>

  <div class="section">
    <h2>Shared Notes</h2>
    <textarea id="notes" placeholder="Notes sync across all devices..."></textarea>
  </div>

  <div class="section">
    <h2>Add New Task</h2>
    <input type="text" id="taskInput" placeholder="Task description">
    <select id="taskCategory">
        <option value="Home">Home</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
    </select>
    <input type="date" id="taskDate">
    <button onclick="addTask()" style="width: 100%; background: #28a745;">Add Task</button>
  </div>

  <div id="categoriesSection"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBK8WyG6Ax3tRRq9sPBol-e9LDSiwB9JZE",
      authDomain: "mydashboard-7ace0.firebaseapp.com",
      databaseURL: "https://mydashboard-7ace0-default-rtdb.asia-southeast1.firebasedatabase.app/", 
      projectId: "mydashboard-7ace0",
      storageBucket: "mydashboard-7ace0.firebasestorage.app",
      messagingSenderId: "66001498071",
      appId: "1:66001498071:web:b28d7e058b99bdd0bfe592"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let savedTasks = [];
    const categories = ["Home", "Work", "Personal"];

    // --- NOTIFICATION LOGIC ---
    function requestNotifPermission() {
      Notification.requestPermission().then(permission => {
        const status = document.getElementById('notifStatus');
        if (permission === "granted") {
          status.textContent = "✅ Notifications Enabled!";
          new Notification("Dashboard", { body: "You will now receive task reminders!" });
        } else {
          status.textContent = "❌ Notifications Blocked. Check browser settings.";
        }
      });
    }

    function checkDeadlines() {
      const today = new Date().toISOString().split('T')[0];
      savedTasks.forEach(task => {
        if (task.date === today && !task.done && !task.notified) {
          new Notification("Task Reminder", {
            body: `Don't forget: ${task.text}`,
            icon: "https://cdn-icons-png.flaticon.com/512/1827/1827347.png"
          });
          task.notified = true; // Prevent multiple alerts for the same task
        }
      });
    }

    // --- FIREBASE SYNC ---
    db.ref('dashboard').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        savedTasks = data.tasks || [];
        document.getElementById('notes').value = data.notes || "";
        rebuildLists();
        checkDeadlines(); // Check for alerts whenever data updates
      }
    });

    function saveData() {
      db.ref('dashboard').update({
        tasks: savedTasks,
        notes: document.getElementById('notes').value
      });
    }

    // UI Logic
    document.getElementById('notes').addEventListener('input', saveData);

    function addTask() {
      const input = document.getElementById("taskInput");
      const category = document.getElementById("taskCategory").value;
      const date = document.getElementById("taskDate").value;
      if (input.value) {
        savedTasks.push({ text: input.value, done: false, category: category, date: date, notified: false });
        saveData();
        input.value = "";
      }
    }

    function rebuildLists() {
      const section = document.getElementById("categoriesSection");
      section.innerHTML = "";
      categories.forEach(cat => {
        const catDiv = document.createElement("div");
        catDiv.className = "section";
        catDiv.innerHTML = `<h3>${cat}</h3><ul id="${cat.toLowerCase()}List"></ul>`;
        section.appendChild(catDiv);
        
        const list = document.getElementById(cat.toLowerCase() + "List");
        savedTasks.filter(t => t.category === cat).forEach((task, index) => {
          const li = document.createElement("li");
          li.innerHTML = `<input type="checkbox" ${task.done ? 'checked' : ''}> <span>${task.text}</span>`;
          li.querySelector('input').onclick = () => {
             const taskIdx = savedTasks.indexOf(task);
             savedTasks[taskIdx].done = !savedTasks[taskIdx].done;
             saveData();
          };
          list.appendChild(li);
        });
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { 
      --glass: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.5);
      --text: #1a1c1e; 
      --accent: #6366f1; 
      --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
    }
    [data-theme="dark"] { 
      --glass: rgba(15, 23, 42, 0.85);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc; 
      --accent: #818cf8; 
    }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      margin: 0; min-height: 100vh; color: var(--text); transition: 0.4s;
      background: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
      display: flex; flex-direction: row;
    }

    /* Responsive Layout */
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .sidebar { width: auto !important; margin: 10px !important; position: static !important; }
      .main-content { padding: 10px !important; }
      .task-grid { grid-template-columns: 1fr !important; }
      .meal-grid { grid-template-columns: 1fr !important; }
    }

    .sidebar {
      width: 300px; height: auto; max-height: calc(100vh - 40px); margin: 20px;
      background: var(--glass); backdrop-filter: blur(20px);
      border-radius: 28px; border: 1px solid var(--glass-border);
      padding: 25px; box-shadow: var(--card-shadow);
      display: flex; flex-direction: column; gap: 15px;
      position: sticky; top: 20px; overflow-y: auto;
    }

    .main-content { flex: 1; padding: 20px 40px 40px 0; max-width: 1100px; width: 100%; box-sizing: border-box; }

    .section { 
      background: var(--glass); backdrop-filter: blur(20px);
      padding: 25px; border-radius: 24px; border: 1px solid var(--glass-border);
      box-shadow: var(--card-shadow); margin-bottom: 25px;
    }

    /* UI Components */
    .status-container { background: rgba(0,0,0,0.03); padding: 20px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .mgmt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .mgmt-label { font-size: 0.85rem; font-weight: 800; }
    .db-list { max-height: 150px; overflow-y: auto; border-radius: 12px; background: rgba(0,0,0,0.03); padding: 8px; display: none; margin-top: 8px; }
    .db-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; font-size: 0.8rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
    
    input, select { padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.2); color: var(--text); font-family: inherit; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
    .btn-add { padding: 10px 18px; border-radius: 12px; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: 800; }
    .btn-del { color: #ff4d4d; background: none; border: none; cursor: pointer; font-size: 1.2rem; }

    .task-item { display: flex; align-items: center; padding: 14px; background: rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 10px; }
    .task-text { flex: 1; padding: 4px 8px; cursor: text; font-size: 1rem; }
    .task-text:focus { background: rgba(0,0,0,0.05); outline: none; border-radius: 8px; }

    .progress-ring { width: 50px; height: 50px; transform: rotate(-90deg); }
    .progress-ring-circle { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; transition: 0.4s; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body data-theme="light">

  <div class="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <button style="width:36px; height:36px; border-radius:10px; border:1px solid var(--glass-border); background:var(--glass); cursor:pointer;" onclick="toggleTheme()">🌓</button>
      <div id="greeting" style="font-weight: 800; font-size: 1.2rem;">Hello!</div>
    </div>
    
    <div class="status-container">
      <div id="temp" style="font-size: 2.2rem; font-weight: 800; color: var(--accent);">--°</div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <svg class="progress-ring"><circle class="progress-ring-circle" id="circle" r="20" cx="25" cy="25" stroke-dasharray="125" stroke-dashoffset="125"></circle></svg>
        <span style="font-size: 0.75rem; font-weight: 800;" id="progressText">0% Done</span>
      </div>
    </div>

    <hr style="opacity: 0.1; width: 100%; margin: 5px 0;">
    <div style="font-size: 0.65rem; font-weight: 800; opacity: 0.4; text-transform: uppercase;">Management</div>

    <div class="mgmt-card">
      <div class="mgmt-header"><span class="mgmt-label">🍱 Food Master</span><button class="view-btn" style="background:none; border:none; color:var(--accent); font-weight:800; font-size:0.65rem; cursor:pointer;" onclick="toggleVisibility('foodList')">VIEW ALL</button></div>
      <div style="display: flex; gap: 8px;"><input type="text" id="foodIn" placeholder="Add..."><button class="btn-add" onclick="addFood()">+</button></div>
      <div id="foodList" class="db-list"></div>
    </div>

    <div class="mgmt-card">
      <div class="mgmt-header"><span class="mgmt-label">🗂️ Categories</span><button class="view-btn" style="background:none; border:none; color:var(--accent); font-weight:800; font-size:0.65rem; cursor:pointer;" onclick="toggleVisibility('catList')">VIEW ALL</button></div>
      <div style="display: flex; gap: 8px;"><input type="text" id="catIn" placeholder="Add..."><button class="btn-add" onclick="addCat()">+</button></div>
      <div id="catList" class="db-list"></div>
    </div>
  </div>

  <div class="main-content">
    <div class="section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h3 style="margin:0; font-weight: 800;">🍽️ Meal Planner</h3>
        <input type="date" id="mealDate" onchange="loadMealData()" style="width: auto;">
      </div>
      <div class="meal-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
        <div style="padding:15px; border-radius:18px; background:rgba(0,0,0,0.02); border:1px solid var(--glass-border);">
          <small style="color:var(--accent); font-weight:800; display:block; margin-bottom:8px;">MORNING</small>
          <select id="select-morn" onchange="updateMeal('morn')"></select>
        </div>
        <div style="padding:15px; border-radius:18px; background:rgba(0,0,0,0.02); border:1px solid var(--glass-border);">
          <small style="color:var(--accent); font-weight:800; display:block; margin-bottom:8px;">AFTERNOON</small>
          <select id="select-aft" onchange="updateMeal('aft')"></select>
        </div>
        <div style="padding:15px; border-radius:18px; background:rgba(0,0,0,0.02); border:1px solid var(--glass-border);">
          <small style="color:var(--accent); font-weight:800; display:block; margin-bottom:8px;">NIGHT</small>
          <select id="select-nyt" onchange="updateMeal('nyt')"></select>
        </div>
      </div>
    </div>

    <div class="section">
      <h3 style="margin-top:0; font-weight: 800;">✍️ Quick Add Task</h3>
      <div class="task-grid" style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 12px;">
        <input type="text" id="taskIn" placeholder="Task name...">
        <select id="taskCatSelect"></select>
        <input type="date" id="taskD">
        <input type="time" id="taskT">
        <button onclick="addTask()" class="btn-add">Add Task</button>
      </div>
    </div>
    <div id="taskContainer"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBK8WyG6Ax3tRRq9sPBol-e9LDSiwB9JZE",
      authDomain: "mydashboard-7ace0.firebaseapp.com",
      databaseURL: "https://mydashboard-7ace0-default-rtdb.asia-southeast1.firebasedatabase.app/", 
      projectId: "mydashboard-7ace0",
      storageBucket: "mydashboard-7ace0.firebasestorage.app",
      messagingSenderId: "66001498071",
      appId: "1:66001498071:web:b28d7e058b99bdd0bfe592"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let tasks = [], categories = [], masterFoods = [];

    // --- Weather Logic Fixed ---
    async function syncWeather() {
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=12.9716&longitude=77.5946&current_weather=true');
        const data = await res.json();
        const currentTemp = Math.round(data.current_weather.temperature);
        document.getElementById('temp').innerText = currentTemp + "°";
        db.ref('dashboard/weather').set(currentTemp); 
      } catch (e) { document.getElementById('temp').innerText = "32°"; }
    }

    db.ref('dashboard/weather').on('value', (s) => {
      const val = s.val();
      if (val) document.getElementById('temp').innerText = val + "°";
      else syncWeather(); // Fetch if Firebase node is empty
    });

    function toggleVisibility(id) {
      const el = document.getElementById(id);
      el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    db.ref('dashboard').on('value', (snap) => {
      const data = snap.val() || {};
      categories = data.categories || ["Home"];
      masterFoods = data.masterFoods || [];
      tasks = Array.isArray(data.tasks) ? data.tasks : [];

      document.getElementById('taskCatSelect').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
      const opts = `<option value="">Select...</option>` + masterFoods.map(f => `<option value="${f}">${f}</option>`).join('');
      ['morn', 'aft', 'nyt'].forEach(t => document.getElementById(`select-${t}`).innerHTML = opts);

      document.getElementById('foodList').innerHTML = masterFoods.map((f, i) => `<div class="db-item"><span>${f}</span><button class="btn-del" onclick="delFood(${i})">&times;</button></div>`).join('');
      document.getElementById('catList').innerHTML = categories.map((c, i) => `<div class="db-item"><span>${c}</span><button class="btn-del" onclick="delCat(${i})">&times;</button></div>`).join('');

      updateProgress(); renderTasks(); loadMealData();
    });

    function addFood() { const v = document.getElementById('foodIn').value.trim(); if(v){masterFoods.push(v); db.ref('dashboard/masterFoods').set(masterFoods); document.getElementById('foodIn').value="";} }
    function delFood(i) { masterFoods.splice(i,1); db.ref('dashboard/masterFoods').set(masterFoods); }
    function addCat() { const v = document.getElementById('catIn').value.trim(); if(v){categories.push(v); db.ref('dashboard/categories').set(categories); document.getElementById('catIn').value="";} }
    function delCat(i) { categories.splice(i,1); db.ref('dashboard/categories').set(categories); }

    function addTask() {
      const text = document.getElementById('taskIn').value.trim();
      if (!text) return;
      tasks.push({ text, cat: document.getElementById('taskCatSelect').value, date: document.getElementById('taskD').value, time: document.getElementById('taskT').value, done: false });
      db.ref('dashboard/tasks').set(tasks).then(() => document.getElementById('taskIn').value = "");
    }

    function editTask(i, newText) { if(tasks[i].text !== newText) { tasks[i].text = newText; db.ref('dashboard/tasks').set(tasks); } }
    function toggleDone(i) { tasks[i].done = !tasks[i].done; db.ref('dashboard/tasks').set(tasks); }
    function deleteTask(i) { tasks.splice(i, 1); db.ref('dashboard/tasks').set(tasks); }

    function updateProgress() {
      const total = tasks.length, done = tasks.filter(t => t.done).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      document.getElementById('circle').style.strokeDashoffset = 125 - (pct / 100) * 125;
      document.getElementById('progressText').innerText = `${pct}% Done`;
    }

    function renderTasks() {
      const cont = document.getElementById('taskContainer'); cont.innerHTML = "";
      categories.forEach(cat => {
        const div = document.createElement('div'); div.className = "section";
        div.innerHTML = `<h3 style="margin-top:0;">${cat}</h3><div id="l-${cat.replace(/\s+/g,'')}"></div>`;
        cont.appendChild(div);
        tasks.filter(t => t.cat === cat).forEach((t) => {
          const idx = tasks.indexOf(t);
          div.querySelector('div').innerHTML += `
            <div class="task-item">
              <input type="checkbox" style="width:auto; margin-right:15px;" ${t.done?'checked':''} onchange="toggleDone(${idx})">
              <div class="task-text" contenteditable="true" onblur="editTask(${idx}, this.innerText)" onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" style="${t.done?'text-decoration:line-through; opacity:0.4':''}">${t.text}</div>
              <small style="opacity:0.5; margin-right:10px;">${t.time || ''}</small>
              <button onclick="deleteTask(${idx})" class="btn-del">&times;</button>
            </div>`;
        });
      });
    }

    function updateMeal(s) { db.ref(`dashboard/mealPlanner/${document.getElementById('mealDate').value}/${s}`).set(document.getElementById(`select-${s}`).value); }
    function loadMealData() {
      db.ref(`dashboard/mealPlanner/${document.getElementById('mealDate').value}`).once('value', (snap) => {
        const d = snap.val() || {};
        ['morn', 'aft', 'nyt'].forEach(t => document.getElementById(`select-${t}`).value = d[t] || "");
      });
    }

    function toggleTheme() {
      const cur = document.body.getAttribute('data-theme');
      db.ref('dashboard/theme').set(cur === 'light' ? 'dark' : 'light');
    }
    db.ref('dashboard/theme').on('value', (s) => document.body.setAttribute('data-theme', s.val() || 'light'));

    const h = new Date().getHours();
    document.getElementById('greeting').innerText = (h < 12) ? "Morning!" : (h < 17) ? "Afternoon!" : "Evening!";
    document.getElementById('mealDate').value = new Date().toISOString().split('T')[0];
  </script>
</body>
</html>
